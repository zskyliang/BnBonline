<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>泡泡堂 HTML5 单机版</title>
    <link rel="icon" href="data:,">
    <style>
        body {
            margin: 0;
            background: #121212;
            color: #fff;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        .page {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 16px;
            padding: 20px;
            box-sizing: border-box;
        }

        .game-shell {
            width: 800px;
            max-width: 100%;
            display: flex;
            justify-content: center;
        }

        .game-shell canvas {
            display: block;
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
        }

        .match-panel {
            width: 220px;
            min-height: 600px;
            background: rgba(8, 12, 22, 0.92);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
            padding: 14px 12px;
            box-sizing: border-box;
            color: #e8f1ff;
            display: none;
        }

        .match-title {
            font-size: 16px;
            font-weight: 700;
            margin: 0 0 8px 0;
            letter-spacing: 0.5px;
        }

        .round-timer {
            font-size: 30px;
            font-weight: 800;
            margin: 0 0 14px 0;
            color: #ffe38b;
        }

        .score-list {
            margin: 0;
            padding: 0;
            list-style: none;
        }

        .config-block {
            margin: 0 0 12px 0;
            padding: 10px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.06);
        }

        .config-label {
            display: block;
            font-size: 13px;
            margin-bottom: 6px;
            color: #cdd9f6;
        }

        .config-row {
            display: flex;
            gap: 6px;
        }

        .config-input {
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            background: rgba(0, 0, 0, 0.2);
            color: #fff;
            padding: 6px 8px;
            box-sizing: border-box;
        }

        .config-button {
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 6px;
            background: #1f4ca3;
            color: #fff;
            padding: 0 10px;
            cursor: pointer;
            font-size: 12px;
        }

        .config-hint {
            margin-top: 6px;
            font-size: 12px;
            color: #9bb2dd;
        }

        .score-item {
            margin-bottom: 8px;
            padding: 8px 10px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.06);
            font-size: 14px;
            line-height: 1.4;
        }

    </style>
    <script src="game/game.js" type="text/javascript"></script>
    <script src="game/bnbAStar.js" type="text/javascript"></script>
    <script src="game/bnbMap.js" type="text/javascript"></script>
    <script src="game/bnbSound.js" type="text/javascript"></script>
    <script src="game/bnbRide.js" type="text/javascript"></script>
    <script src="game/bnbRole.js" type="text/javascript"></script>
    <script src="game/bnbPaopao.js" type="text/javascript"></script>
    <script src="game/bnbBarrier.js" type="text/javascript"></script>
    <script src="game/bnb.js" type="text/javascript"></script>
    <script src="game/bnbMonsters.js" type="text/javascript"></script>
</head>
<body>
    <main class="page">
        <div id="game-root" class="game-shell"></div>
        <aside id="match-panel" class="match-panel">
            <h2 class="match-title">本局信息</h2>
            <div id="round-timer" class="round-timer">05:00</div>
            <div class="config-block">
                <label for="max-move-step-input" class="config-label">人物最大速度</label>
                <div class="config-row">
                    <input id="max-move-step-input" class="config-input" type="number" min="2" max="12" step="1" value="4">
                    <button id="apply-max-move-step" class="config-button" type="button">应用</button>
                </div>
                <div id="max-move-step-hint" class="config-hint">当前上限：4</div>
            </div>
            <ul id="score-list" class="score-list"></ul>
        </aside>
    </main>

    <script type="text/javascript">
        window.addEventListener("load", function () {
            StartSinglePlayerGame(3);
        });
    </script>
</body>
</html>
