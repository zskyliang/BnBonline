<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>泡泡堂 HTML5 单机版</title>
    <link rel="icon" href="data:,">
    <style>
        body {
            margin: 0;
            background: #121212;
            color: #fff;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        .page {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 16px;
            padding: 20px;
            box-sizing: border-box;
        }

        .game-shell {
            width: 800px;
            max-width: 100%;
            display: flex;
            justify-content: center;
        }

        .game-shell canvas {
            display: block;
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
        }

        .match-panel {
            width: 220px;
            min-height: 600px;
            background: rgba(8, 12, 22, 0.92);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
            padding: 14px 12px;
            box-sizing: border-box;
            color: #e8f1ff;
            display: none;
        }

        .match-title {
            font-size: 16px;
            font-weight: 700;
            margin: 0 0 8px 0;
            letter-spacing: 0.5px;
        }

        .round-timer {
            font-size: 30px;
            font-weight: 800;
            margin: 0 0 14px 0;
            color: #ffe38b;
        }

        .score-list {
            margin: 0;
            padding: 0;
            list-style: none;
        }

        .config-block {
            margin: 0 0 12px 0;
            padding: 10px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.06);
        }

        .config-label {
            display: block;
            font-size: 13px;
            margin-bottom: 6px;
            color: #cdd9f6;
        }

        .config-row {
            display: flex;
            gap: 6px;
        }

        .config-input {
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            background: rgba(0, 0, 0, 0.2);
            color: #fff;
            padding: 6px 8px;
            box-sizing: border-box;
        }

        .config-button {
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 6px;
            background: #1f4ca3;
            color: #fff;
            padding: 0 10px;
            cursor: pointer;
            font-size: 12px;
        }

        .config-hint {
            margin-top: 6px;
            font-size: 12px;
            color: #9bb2dd;
        }

        .score-item {
            margin-bottom: 8px;
            padding: 8px 10px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.06);
            font-size: 14px;
            line-height: 1.4;
        }

    </style>
    <script src="game/game.js" type="text/javascript"></script>
    <script src="game/bnbAStar.js" type="text/javascript"></script>
    <script src="game/bnbMap.js" type="text/javascript"></script>
    <script src="game/bnbSound.js" type="text/javascript"></script>
    <script src="game/bnbRide.js" type="text/javascript"></script>
    <script src="game/bnbRole.js" type="text/javascript"></script>
    <script src="game/bnbPaopao.js" type="text/javascript"></script>
    <script src="game/bnbBarrier.js" type="text/javascript"></script>
    <script src="game/bnb.js" type="text/javascript"></script>
    <script src="game/bnbMonsters.js" type="text/javascript"></script>
</head>
<body>
    <main class="page">
        <div id="game-root" class="game-shell"></div>
        <aside id="match-panel" class="match-panel">
            <h2 class="match-title">本局信息</h2>
            <div id="round-timer" class="round-timer">05:00</div>
            <div class="config-block">
                <label for="max-move-step-input" class="config-label">人物最大速度 (px/s)</label>
                <div class="config-row">
                    <input id="max-move-step-input" class="config-input" type="number" min="50" max="1000" step="25" value="300">
                    <button id="apply-max-move-step" class="config-button" type="button">应用</button>
                </div>
                <div id="max-move-step-hint" class="config-hint">当前上限：300 px/s</div>
            </div>
            <div class="config-block">
                <label for="max-bubble-count-input" class="config-label">人物最大水泡数</label>
                <div class="config-row">
                    <input id="max-bubble-count-input" class="config-input" type="number" min="2" max="20" step="1" value="8">
                    <button id="apply-max-bubble-count" class="config-button" type="button">应用</button>
                </div>
                <div id="max-bubble-count-hint" class="config-hint">当前上限：8</div>
            </div>
            <div class="config-block">
                <label for="max-power-input" class="config-label">人物最大威力 (覆盖格)</label>
                <div class="config-row">
                    <input id="max-power-input" class="config-input" type="number" min="2" max="20" step="1" value="10">
                    <button id="apply-max-power" class="config-button" type="button">应用</button>
                </div>
                <div id="max-power-hint" class="config-hint">当前上限：10 格</div>
            </div>
            <div class="config-block">
                <label for="bubble-skin-select" class="config-label">玩家水泡皮肤</label>
                <div class="config-row">
                    <select id="bubble-skin-select" class="config-input">
                        <option value="football">足球</option>
                        <option value="basketball">篮球</option>
                    </select>
                </div>
                <div id="bubble-skin-hint" class="config-hint">当前皮肤：足球</div>
            </div>
            <div class="config-block">
                <label for="map-select" class="config-label">游戏地图</label>
                <div class="config-row">
                    <select id="map-select" class="config-input"></select>
                </div>
                <div id="map-select-hint" class="config-hint">当前地图：当前地图（经典）</div>
            </div>
            <div class="config-block">
                <label for="ai-enemy-count-select" class="config-label">AI敌人数</label>
                <div class="config-row">
                    <select id="ai-enemy-count-select" class="config-input">
                        <option value="0">0</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                    </select>
                </div>
                <div id="ai-enemy-count-hint" class="config-hint">当前敌人数：3</div>
            </div>
            <ul id="score-list" class="score-list"></ul>
        </aside>
    </main>

    <script type="text/javascript">
        window.addEventListener("load", function () {
            var query = new URLSearchParams(window.location.search);
            if (query.get("mode") === "expert_duel_1v1") {
                StartExpertDuelGame();
            }
            else if (query.get("mode") === "battle") {
                StartSinglePlayerGame();
            }
            else if (query.get("autostart") === "0") {
                // 由外部训练脚本控制启动时机（用于注入恢复上下文）
                return;
            }
            else {
                StartAIDodgeTraining();
            }
        });
    </script>
</body>
</html>
